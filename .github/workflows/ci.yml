name: CI

# Corre en cada push y en cada Pull Request. Si algun paso falla, el build
# queda en rojo y (con branch protection activada) el merge se bloquea.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Postgres real, igual que en produccion. La imagen trae btree_gist.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: canchaya
          POSTGRES_PASSWORD: canchaya
          POSTGRES_DB: canchaya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U canchaya"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://canchaya:canchaya@localhost:5432/canchaya_test
      DATABASE_URL: postgresql+psycopg://canchaya:canchaya@localhost:5432/canchaya_test
      SECRET_KEY: ci-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy app

      - name: Tests + coverage (falla si <80%)
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80
