# Render Blueprint: despliega la base de datos y la API juntas.
# En Render: New + -> Blueprint -> conecta este repo -> Apply.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: canchaya-db
    plan: free          # 1 GB, sin tarjeta. OJO: expira 30 dias tras crearla.
    databaseName: canchaya
    user: canchaya

services:
  - type: web
    name: canchaya-api
    runtime: python
    plan: free          # se duerme tras 15 min de inactividad (arranque frio ~1 min)
    region: oregon
    buildCommand: "pip install -e ."
    # Corre migraciones en cada arranque (Alembic es idempotente) y luego la API.
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: canchaya-db
          property: connectionString   # llega como postgresql://  (config.py la normaliza)
      - key: SECRET_KEY
        generateValue: true            # Render genera un secreto aleatorio seguro
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: DEBUG
        value: "false"
